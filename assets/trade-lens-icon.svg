<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Trade Lens icon</title>
  <desc id="desc">A dark camera lens with a gold rim and a red-to-green trading line.</desc>
  <defs>
    <radialGradient id="bg" cx="48%" cy="42%" r="72%">
      <stop offset="0%" stop-color="#1a2230"/>
      <stop offset="60%" stop-color="#090e16"/>
      <stop offset="100%" stop-color="#03060b"/>
    </radialGradient>
    <radialGradient id="glass" cx="38%" cy="30%" r="74%">
      <stop offset="0%" stop-color="#394457"/>
      <stop offset="32%" stop-color="#111a28"/>
      <stop offset="72%" stop-color="#06101b"/>
      <stop offset="100%" stop-color="#02050a"/>
    </radialGradient>
    <linearGradient id="gold" x1="72" y1="80" x2="430" y2="430" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7b4b05"/>
      <stop offset="14%" stop-color="#f3bf45"/>
      <stop offset="30%" stop-color="#fff1a6"/>
      <stop offset="48%" stop-color="#b97813"/>
      <stop offset="68%" stop-color="#f7c24b"/>
      <stop offset="84%" stop-color="#fff3a8"/>
      <stop offset="100%" stop-color="#835006"/>
    </linearGradient>
    <linearGradient id="lensStroke" x1="126" y1="106" x2="386" y2="416" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#04070e"/>
      <stop offset="54%" stop-color="#111b2a"/>
      <stop offset="100%" stop-color="#6d7d91"/>
    </linearGradient>
    <linearGradient id="lineGradient" x1="114" y1="295" x2="422" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ff3f37"/>
      <stop offset="48%" stop-color="#ff594b"/>
      <stop offset="56%" stop-color="#ffe169"/>
      <stop offset="70%" stop-color="#85ff6d"/>
      <stop offset="100%" stop-color="#35df63"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 0.95 0 1 0 0 0.67 0 0 1 0 0.19 0 0 0 0.9 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="chartGlow" x="-20%" y="-40%" width="140%" height="180%">
      <feGaussianBlur stdDeviation="3.6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="lensClip">
      <circle cx="256" cy="256" r="146"/>
    </clipPath>
  </defs>

  <rect width="512" height="512" fill="#050811"/>
  <circle cx="256" cy="256" r="239" fill="url(#bg)"/>

  <g opacity="0.98">
    <circle cx="256" cy="256" r="236" fill="none" stroke="#211604" stroke-width="18"/>
    <circle cx="256" cy="256" r="229" fill="none" stroke="url(#gold)" stroke-width="10"/>
    <circle cx="256" cy="256" r="213" fill="none" stroke="#8c5c13" stroke-width="3" opacity="0.9"/>
  </g>

  <g opacity="0.92">
    <path d="M246 37 C219 82 209 113 205 147 L110 95 C149 61 195 41 246 37 Z" fill="#121925" stroke="#c9912c" stroke-width="1.3"/>
    <path d="M335 64 C321 113 303 142 278 166 L397 151 C385 116 364 86 335 64 Z" fill="#0e1420" stroke="#c9912c" stroke-width="1.2"/>
    <path d="M452 196 C405 208 370 211 333 203 L418 315 C443 282 455 241 452 196 Z" fill="#111823" stroke="#c9912c" stroke-width="1.2"/>
    <path d="M389 391 C338 378 306 362 281 335 L268 453 C313 450 355 428 389 391 Z" fill="#0d131d" stroke="#c9912c" stroke-width="1.2"/>
    <path d="M175 438 C194 390 214 360 242 338 L117 350 C130 389 150 417 175 438 Z" fill="#111824" stroke="#c9912c" stroke-width="1.2"/>
    <path d="M59 304 C107 289 142 285 180 293 L93 183 C67 217 55 260 59 304 Z" fill="#0e1420" stroke="#c9912c" stroke-width="1.2"/>
  </g>

  <circle cx="256" cy="256" r="161" fill="#02050b" stroke="#050912" stroke-width="20"/>
  <circle cx="256" cy="256" r="150" fill="url(#glass)" stroke="url(#lensStroke)" stroke-width="6"/>
  <circle cx="256" cy="256" r="142" fill="none" stroke="#283448" stroke-width="1.5" opacity="0.65"/>

  <g clip-path="url(#lensClip)" opacity="0.32">
    <path d="M111 184 H401 M111 232 H401 M111 280 H401 M111 328 H401" stroke="#24354a" stroke-width="1"/>
    <path d="M160 110 V402 M208 110 V402 M256 110 V402 M304 110 V402 M352 110 V402" stroke="#26384f" stroke-width="1"/>
    <ellipse cx="199" cy="137" rx="117" ry="62" fill="#ffffff" opacity="0.08"/>
  </g>

  <g clip-path="url(#lensClip)" filter="url(#chartGlow)">
    <polyline points="110,256 121,248 130,260 137,257 146,271 157,265 166,282 177,278 188,292 199,287 211,305 225,314 238,307 249,293 260,286 272,276 283,267 294,268 306,256 318,244 329,236 339,213 350,203 361,224 373,207 384,215 395,207 407,176 418,170 429,147" fill="none" stroke="url(#lineGradient)" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <g filter="url(#glow)">
    <line x1="200" y1="328" x2="256" y2="256" stroke="#f7b935" stroke-width="4" stroke-linecap="round"/>
    <circle cx="256" cy="256" r="34" fill="none" stroke="#e39d21" stroke-width="1.1" opacity="0.82"/>
    <circle cx="256" cy="256" r="22" fill="none" stroke="#f4bd3c" stroke-width="1.1" opacity="0.9"/>
    <circle cx="256" cy="256" r="11" fill="#fff0a5"/>
  </g>

  <circle cx="256" cy="256" r="150" fill="none" stroke="#02050a" stroke-width="9"/>
  <circle cx="256" cy="256" r="239" fill="none" stroke="#000000" stroke-width="3" opacity="0.7"/>
</svg>
